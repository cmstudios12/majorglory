<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Payment Successful - MpumaTickets</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            font-family: Poppins, sans-serif;
            background: #0b1020;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh
        }

        .card {
            width: min(92%, 720px);
            background: #151c31;
            border: 1px solid #2b3557;
            border-radius: 18px;
            padding: 32px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, .35)
        }

        .ok {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            background: #1f9d55;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 42px;
            margin: 0 auto 18px
        }

        h1 {
            text-align: center;
            margin: 0 0 8px
        }

        p {
            text-align: center;
            color: #b8c2d9
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin: 24px 0
        }

        .box {
            background: #0f1527;
            padding: 14px;
            border-radius: 12px
        }

        .box small {
            display: block;
            color: #97a3c4
        }

        .box strong {
            display: block;
            margin-top: 6px
        }

        .actions {
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap
        }

        button,
        a {
            padding: 12px 20px;
            border: none;
            border-radius: 10px;
            background: #2563eb;
            color: #fff;
            text-decoration: none;
            font-weight: 600;
            cursor: pointer
        }

        .secondary {
            background: #334155
        }

        #loading {
            margin-top: 18px;
            text-align: center;
            color: #facc15
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>
    <div class="card">
        <div class="ok">✓</div>
        <h1>Payment Successful</h1>
        <p>Your payment has been received. Your ticket is being prepared.</p>

        <div class="grid">
            <div class="box"><small>Booking Reference</small><strong id="ref">Loading...</strong></div>
            <div class="box"><small>Status</small><strong id="status">Paid</strong></div>
            <div class="box"><small>Event</small><strong id="event">Loading...</strong></div>
            <div class="box"><small>Total Paid</small><strong id="amount">Loading...</strong></div>
        </div>

        <div id="loading">Loading your booking...</div>

        <div class="actions">
            <button id="downloadBtn" disabled>Download Ticket</button>
            <a class="secondary" href="/">Return Home</a>
        </div>
    </div>

    <script>
        const SUPABASE_URL = "https://hrkjflwhbcrcewdmkrta.supabase.co";
        const SUPABASE_KEY = "sb_publishable_cWkHNJQ2timI4nHLyXaTNw_AOjAj5XR";
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        (async () => {
            const ref = new URLSearchParams(location.search).get("ref");
            document.getElementById("ref").textContent = ref || "-";
            if (!ref) { document.getElementById("loading").textContent = "Missing booking reference."; return; }

            const { data: booking, error } = await supabase
                .from("bookings")
                .select("*,events(title)")
                .eq("booking_reference", ref)
                .single();

            if (error || !booking) {
                document.getElementById("loading").textContent = "Booking not found yet. Refresh in a few seconds.";
                return;
            }

            document.getElementById("event").textContent = booking.events?.title || "Event";
            document.getElementById("amount").textContent = "R" + Number(booking.total_amount || 0).toFixed(2);
            document.getElementById("status").textContent = booking.payment_status;
            document.getElementById("loading").textContent = "Payment confirmed.";

            const btn = document.getElementById("downloadBtn");
            btn.disabled = false;
            btn.onclick = () => window.open("/ticket.html?ref=" + encodeURIComponent(ref), "_blank");
        })();
    </script>
</body>

</html>
