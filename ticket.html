<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Your Ticket | MpumaTickets</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Inter, Arial, sans-serif;
        }

        body {
            min-height: 100vh;
            background:
                radial-gradient(circle at top left, rgba(124, 60, 255, .35), transparent 34%),
                radial-gradient(circle at top right, rgba(255, 61, 129, .24), transparent 32%),
                #070812;
            color: #fff;
            padding: 22px;
        }

        a {
            color: inherit;
            text-decoration: none;
        }

        .page {
            max-width: 1080px;
            margin: auto;
        }

        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 16px;
            margin-bottom: 28px;
            padding: 16px 18px;
            border-radius: 22px;
            background: rgba(255, 255, 255, .075);
            border: 1px solid rgba(255, 255, 255, .14);
            backdrop-filter: blur(18px);
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 950;
            letter-spacing: -.5px;
        }

        .brand i {
            width: 44px;
            height: 44px;
            display: grid;
            place-items: center;
            border-radius: 15px;
            background: linear-gradient(135deg, #7c3cff, #ff3d81);
        }

        .top-actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: flex-end;
        }

        .btn {
            border: 0;
            min-height: 44px;
            padding: 0 16px;
            border-radius: 999px;
            color: #fff;
            background: linear-gradient(135deg, #7c3cff, #ff3d81);
            font-weight: 900;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn.secondary {
            background: rgba(255, 255, 255, .09);
            border: 1px solid rgba(255, 255, 255, .14);
        }

        .status-card {
            padding: 28px;
            border-radius: 30px;
            background: rgba(255, 255, 255, .075);
            border: 1px solid rgba(255, 255, 255, .14);
            backdrop-filter: blur(20px);
            box-shadow: 0 25px 70px rgba(0, 0, 0, .35);
            margin-bottom: 24px;
            text-align: center;
        }

        .status-card h1 {
            font-size: clamp(34px, 6vw, 58px);
            letter-spacing: -2px;
            line-height: 1;
            margin-bottom: 12px;
        }

        .status-card p {
            color: #a7adbd;
            line-height: 1.7;
            max-width: 720px;
            margin: auto;
        }

        .notice {
            margin-top: 18px;
            padding: 14px 16px;
            border-radius: 18px;
            background: rgba(255, 207, 77, .12);
            border: 1px solid rgba(255, 207, 77, .28);
            color: #ffe19a;
            font-weight: 800;
            font-size: 14px;
            display: none;
        }

        .notice.active {
            display: block;
        }

        .tickets-wrap {
            display: grid;
            gap: 24px;
        }

        .ticket {
            overflow: hidden;
            border-radius: 34px;
            background:
                linear-gradient(135deg, rgba(124, 60, 255, .96), rgba(255, 61, 129, .96));
            box-shadow: 0 28px 80px rgba(0, 0, 0, .48);
            border: 1px solid rgba(255, 255, 255, .24);
        }

        .ticket-poster {
            min-height: 280px;
            background:
                linear-gradient(to top, rgba(0, 0, 0, .78), rgba(0, 0, 0, .1)),
                radial-gradient(circle at center, rgba(255, 255, 255, .18), transparent 45%),
                #151b33;
            background-size: cover;
            background-position: center;
            position: relative;
            padding: 22px;
            display: flex;
            align-items: flex-end;
        }

        .ticket-badge {
            position: absolute;
            top: 18px;
            left: 18px;
            padding: 9px 13px;
            border-radius: 999px;
            background: rgba(0, 0, 0, .45);
            border: 1px solid rgba(255, 255, 255, .22);
            backdrop-filter: blur(12px);
            font-weight: 950;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: .5px;
        }

        .ticket-poster h2 {
            font-size: clamp(30px, 6vw, 58px);
            line-height: 1;
            letter-spacing: -2px;
            max-width: 760px;
            text-shadow: 0 12px 28px rgba(0, 0, 0, .45);
        }

        .ticket-body {
            display: grid;
            grid-template-columns: 1fr 280px;
            gap: 22px;
            padding: 26px;
        }

        .ticket-info {
            display: grid;
            gap: 16px;
        }

        .ticket-top {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 18px;
            border-bottom: 1px dashed rgba(255, 255, 255, .5);
            padding-bottom: 18px;
        }

        .ticket-top span {
            color: rgba(255, 255, 255, .76);
            font-size: 12px;
            text-transform: uppercase;
            font-weight: 950;
            letter-spacing: .6px;
            display: block;
            margin-bottom: 5px;
        }

        .ticket-top strong {
            font-size: 18px;
            word-break: break-word;
        }

        .detail-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }

        .detail {
            padding: 15px;
            border-radius: 18px;
            background: rgba(0, 0, 0, .22);
            border: 1px solid rgba(255, 255, 255, .14);
        }

        .detail small {
            color: rgba(255, 255, 255, .68);
            text-transform: uppercase;
            letter-spacing: .5px;
            font-size: 10px;
            font-weight: 950;
            display: block;
            margin-bottom: 7px;
        }

        .detail strong {
            line-height: 1.45;
            font-size: 14px;
            word-break: break-word;
        }

        .qr-panel {
            padding: 20px;
            border-radius: 26px;
            background: rgba(255, 255, 255, .95);
            color: #111;
            display: grid;
            place-items: center;
            text-align: center;
            align-content: center;
            gap: 12px;
            min-height: 300px;
        }

        .qr-box {
            padding: 10px;
            border-radius: 18px;
            background: #fff;
        }

        .qr-panel h3 {
            font-size: 14px;
            word-break: break-word;
        }

        .qr-panel p {
            color: #475569;
            font-size: 12px;
            line-height: 1.5;
            font-weight: 700;
        }

        .wallet-actions {
            padding: 0 26px 26px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .wallet-btn {
            min-height: 48px;
            border-radius: 999px;
            padding: 0 17px;
            border: 1px solid rgba(255, 255, 255, .18);
            background: rgba(0, 0, 0, .35);
            color: #fff;
            font-weight: 950;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 9px;
            cursor: pointer;
        }

        .empty {
            padding: 28px;
            border-radius: 26px;
            background: rgba(255, 255, 255, .075);
            border: 1px solid rgba(255, 255, 255, .14);
            text-align: center;
            color: #a7adbd;
            line-height: 1.7;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #a7adbd;
            font-weight: 800;
        }

        @media(max-width: 820px) {
            body {
                padding: 14px;
            }

            .topbar {
                align-items: flex-start;
                flex-direction: column;
            }

            .ticket-body {
                grid-template-columns: 1fr;
            }

            .detail-grid {
                grid-template-columns: 1fr;
            }

            .qr-panel {
                min-height: 260px;
            }
        }

        @media print {
            body {
                background: #fff;
                padding: 0;
            }

            .topbar,
            .status-card,
            .wallet-actions,
            .notice {
                display: none !important;
            }

            .page {
                max-width: 100%;
            }

            .tickets-wrap {
                display: block;
            }

            .ticket {
                page-break-after: always;
                box-shadow: none;
                border-radius: 0;
                min-height: 100vh;
            }
        }
    </style>
</head>

<body>
    <div class="page">

        <div class="topbar">
            <a href="index.html" class="brand">
                <i class="fa-solid fa-ticket"></i>
                MpumaTickets
            </a>

            <div class="top-actions">
                <button class="btn secondary" onclick="window.print()">
                    <i class="fa-solid fa-print"></i>
                    Print / Save PDF
                </button>

                <a class="btn secondary" href="index.html">
                    <i class="fa-solid fa-house"></i>
                    Home
                </a>
            </div>
        </div>

        <section class="status-card">
            <h1>Your Ticket</h1>
            <p>
                This ticket is valid only after successful payment confirmation. Present the QR code at the entrance for
                scanning.
            </p>

            <div class="notice" id="noticeBox"></div>
        </section>

        <div id="ticketArea" class="tickets-wrap">
            <div class="loading">Loading your ticket...</div>
        </div>

    </div>

    <script>
        const SUPABASE_URL = "https://hrkjflwhbcrcewdmkrta.supabase.co";
        const SUPABASE_KEY = "sb_publishable_cWkHNJQ2timI4nHLyXaTNw_AOjAj5XR";
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const ticketArea = document.getElementById("ticketArea");
        const noticeBox = document.getElementById("noticeBox");

        function showNotice(message) {
            noticeBox.textContent = message;
            noticeBox.classList.add("active");
        }

        function money(value) {
            return "R" + Number(value || 0).toFixed(2);
        }

        function safe(value, fallback = "-") {
            return value ? String(value) : fallback;
        }

        function formatDate(value) {
            if (!value) return "Date TBC";

            try {
                return new Date(value).toLocaleDateString("en-ZA", {
                    day: "2-digit",
                    month: "long",
                    year: "numeric"
                });
            } catch {
                return value;
            }
        }

        function formatTime(value) {
            if (!value) return "Time TBC";
            return String(value).slice(0, 5);
        }

        function escapeHtml(value) {
            return String(value || "")
                .replaceAll("&", "&amp;")
                .replaceAll("<", "&lt;")
                .replaceAll(">", "&gt;")
                .replaceAll('"', "&quot;")
                .replaceAll("'", "&#039;");
        }

        function walletComingSoon(type) {
            alert(type + " requires a backend wallet pass generator. The ticket is ready, and we can connect real wallet passes after Apple/Google wallet certificates/API setup.");
        }

        async function loadTicket() {
            const ref = new URLSearchParams(window.location.search).get("ref");

            if (!ref) {
                ticketArea.innerHTML = `
          <div class="empty">
            Missing booking reference. Open this page from your payment success page.
          </div>
        `;
                return;
            }

            const { data: booking, error } = await supabaseClient
                .from("bookings")
                .select(`
          *,
          events (
            id,
            title,
            category,
            description,
            venue,
            city,
            event_date,
            start_time,
            cover_image_url
          ),
          booking_items (
            id,
            ticket_name,
            quantity,
            unit_price,
            line_total,
            ticket_type_id
          ),
          tickets (
            id,
            ticket_code,
            holder_name,
            holder_email,
            scan_status,
            ticket_type_id,
            ticket_types (
              name,
              price
            )
          )
        `)
                .eq("booking_reference", ref)
                .single();

            if (error || !booking) {
                ticketArea.innerHTML = `
          <div class="empty">
            Ticket not found yet. If you just paid, wait a few seconds and refresh this page.
          </div>
        `;
                return;
            }

            if (booking.payment_status !== "paid") {
                showNotice("Payment is not confirmed yet. Tickets will appear once PayFast confirms payment.");
                ticketArea.innerHTML = `
          <div class="empty">
            Booking found, but payment status is <strong>${escapeHtml(booking.payment_status || "pending")}</strong>.
            No valid ticket is available yet.
          </div>
        `;
                return;
            }

            if (!booking.tickets || booking.tickets.length === 0) {
                showNotice("Payment is paid, but tickets are not generated yet. Refresh in a few seconds.");
                ticketArea.innerHTML = `
          <div class="empty">
            Tickets are being generated. Please refresh this page shortly.
          </div>
        `;
                return;
            }

            const event = booking.events || {};
            const poster = event.cover_image_url || "";
            const eventDate = formatDate(event.event_date);
            const eventTime = formatTime(event.start_time);
            const venue = `${safe(event.venue, "Venue TBC")}, ${safe(event.city, "City TBC")}`;
            const buyerName = `${safe(booking.first_name, "")} ${safe(booking.last_name, "")}`.trim();

            ticketArea.innerHTML = booking.tickets.map((ticket, index) => {
                const ticketType = ticket.ticket_types?.name || ticket.ticket_type_name || "Ticket";
                const ticketPrice = ticket.ticket_types?.price || 0;
                const qrId = `qr-${index}`;

                return `
          <article class="ticket">
            <div class="ticket-poster" style="${poster ? `background-image:linear-gradient(to top, rgba(0,0,0,.78), rgba(0,0,0,.12)), url('${escapeHtml(poster)}')` : ""}">
              <span class="ticket-badge">${escapeHtml(event.category || "Event Ticket")}</span>
              <h2>${escapeHtml(event.title || "MpumaTickets Event")}</h2>
            </div>

            <div class="ticket-body">
              <div class="ticket-info">
                <div class="ticket-top">
                  <div>
                    <span>Ticket Code</span>
                    <strong>${escapeHtml(ticket.ticket_code)}</strong>
                  </div>

                  <div>
                    <span>Status</span>
                    <strong>${escapeHtml(ticket.scan_status || "valid")}</strong>
                  </div>
                </div>

                <div class="detail-grid">
                  <div class="detail">
                    <small>Ticket Holder</small>
                    <strong>${escapeHtml(ticket.holder_name || buyerName)}</strong>
                  </div>

                  <div class="detail">
                    <small>Email</small>
                    <strong>${escapeHtml(ticket.holder_email || booking.email)}</strong>
                  </div>

                  <div class="detail">
                    <small>Ticket Type</small>
                    <strong>${escapeHtml(ticketType)}</strong>
                  </div>

                  <div class="detail">
                    <small>Ticket Price</small>
                    <strong>${money(ticketPrice)}</strong>
                  </div>

                  <div class="detail">
                    <small>Date & Time</small>
                    <strong>${escapeHtml(eventDate)} • ${escapeHtml(eventTime)}</strong>
                  </div>

                  <div class="detail">
                    <small>Venue</small>
                    <strong>${escapeHtml(venue)}</strong>
                  </div>

                  <div class="detail">
                    <small>Booking Reference</small>
                    <strong>${escapeHtml(booking.booking_reference)}</strong>
                  </div>

                  <div class="detail">
                    <small>Total Paid</small>
                    <strong>${money(booking.total_amount)}</strong>
                  </div>
                </div>
              </div>

              <div class="qr-panel">
                <div class="qr-box" id="${qrId}"></div>
                <h3>${escapeHtml(ticket.ticket_code)}</h3>
                <p>Scan this QR code at the entrance. Do not share this ticket with anyone.</p>
              </div>
            </div>

            <div class="wallet-actions">
              <button class="wallet-btn" onclick="walletComingSoon('Apple Wallet')">
                <i class="fa-brands fa-apple"></i>
                Add to Apple Wallet
              </button>

              <button class="wallet-btn" onclick="walletComingSoon('Google Wallet')">
                <i class="fa-brands fa-google"></i>
                Add to Google Wallet
              </button>

              <button class="wallet-btn" onclick="window.print()">
                <i class="fa-solid fa-file-pdf"></i>
                Save / Print Ticket
              </button>
            </div>
          </article>
        `;
            }).join("");

            booking.tickets.forEach((ticket, index) => {
                new QRCode(document.getElementById(`qr-${index}`), {
                    text: ticket.ticket_code,
                    width: 150,
                    height: 150,
                    colorDark: "#111111",
                    colorLight: "#ffffff",
                    correctLevel: QRCode.CorrectLevel.H
                });
            });
        }

        loadTicket();
    </script>
</body>

</html>
